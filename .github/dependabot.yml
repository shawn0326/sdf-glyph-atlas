version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: monthly
    groups:
      development-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
