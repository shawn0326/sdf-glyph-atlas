name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5

  attach-package:
    name: Attach tested npm package
    needs: release-please
    if: ${{ needs.release-please.outputs.release-created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Check out released source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.release-please.outputs.release-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run complete validation
        run: npm run check:ci

      - name: Create npm artifact and checksum
        run: npm run release:artifact

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.release-tag }}" release-artifacts/* --clobber
